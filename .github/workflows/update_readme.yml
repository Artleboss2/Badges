name: Auto-Update Documentation

on:
  push:
    paths:
      - 'icons/**' # Se déclenche seulement si le dossier icons change
  workflow_dispatch: # Permet de le lancer manuellement si besoin

jobs:
  update-doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Exécution du script de génération
        run: python generate_docs.py
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit et Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add DOCUMENTATION.md
          git commit -m "Auto-update DOCUMENTATION.md with new assets" || echo "Aucun changement"
          git push
